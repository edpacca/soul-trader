<div id="notes-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <h3>Edit Note</h3>
        <textarea id="note-text" maxlength="255" rows="4" style="width: 100%;"></textarea>
        <p id="note-char-count" style="text-align: right; font-size: 0.85em; color: #666;">0 / 255</p>
        <div class="modal-actions">
            <button id="save-note-btn">Save</button>
            <button id="delete-note-btn">Delete</button>
            <button id="cancel-note-btn">Cancel</button>
        </div>
    </div>
</div>
